        let map, markers = [], paths = [];
        let currentFilter = 'all';
        let currentPath = null;
        let walkingMarker = null;
        let currentRouteIndex = -1;
        let displayedRoutes = hikingRoutes; // 当前显示的路线列表
        let currentInfoWindow = null; // 全局维护当前打开的信息窗口

        // 初始化地图
        function initMap() {
            map = new AMap.Map('map-container', {
                zoom: 9,
                center: [116.397428, 39.90923],
                mapStyle: 'amap://styles/whitesmoke',
                viewMode: '2D'
            });

            map.addControl(new AMap.Scale());
            map.addControl(new AMap.ToolBar({
                position: { top: '20px', right: '20px' }
            }));

            // 初始加载所有路线并立即显示
            displayedRoutes = hikingRoutes;
            renderMarkers(displayedRoutes);
            renderRouteList(displayedRoutes);
            
            // 自动适应视野包含所有标记点
            setTimeout(() => {
                if (markers.length > 0) {
                    map.setFitView(markers, false, [60, 60, 60, 60]);
                }
            }, 500);
        }

        // 渲染标记
        function renderMarkers(routes) {
            markers.forEach(marker => map.remove(marker));
            markers = [];
            clearPath();
            closeAllInfoWindows(); // 清除所有信息窗口

            routes.forEach(route => {
                const icon = new AMap.Icon({
                    size: new AMap.Size(40, 40),
                    image: createMarkerSVG(route.difficulty),
                    imageSize: new AMap.Size(40, 40)
                });

                const marker = new AMap.Marker({
                    position: route.location,
                    icon: icon,
                    title: route.name,
                    extData: route
                });

                // 创建信息窗口（注意：移除了 autoMove: false）
                const infoWindow = new AMap.InfoWindow({
                    content: createInfoWindowContent(route),
                    offset: new AMap.Pixel(0, -30)
                    // 允许自动调整位置，避免被遮挡
                });

                marker.on('mouseover', () => {
                    closeAllInfoWindows(); // 先关闭所有窗口
                    currentInfoWindow = infoWindow;
                    infoWindow.open(map, marker.getPosition());
                });

                marker.on('click', () => {
                    showRoutePath(route);
                    closeAllInfoWindows(); // 先关闭所有窗口
                    currentInfoWindow = infoWindow;
                    infoWindow.open(map, marker.getPosition());
                });

                map.add(marker);
                markers.push(marker);
            });

            document.getElementById('routeCount').textContent = routes.length;
        }

        // 关闭所有信息窗口
        function closeAllInfoWindows() {
            if (currentInfoWindow) {
                currentInfoWindow.close();
                currentInfoWindow = null;
            }
            map.clearInfoWindow(); // 确保清除所有窗口
        }

        function createMarkerSVG(difficulty) {
            const colors = { 1: '#34C759', 2: '#007AFF', 3: '#FF9500', 4: '#FF9500', 5: '#FF3B30' };
            const color = colors[difficulty] || '#999';
            const svg = `
                <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="15" fill="${color}" stroke="white" stroke-width="3"/>
                    <text x="20" y="26" text-anchor="middle" fill="white" font-size="16" font-weight="bold">★</text>
                </svg>
            `;
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        function createInfoWindowContent(route) {
            const difficultyStars = '★'.repeat(route.difficulty);
            const sceneryTags = route.scenery.slice(0, 3).map(s => `<span class="info-tag">${s}</span>`).join('');
            const photo = route.photos && route.photos.length > 0 ? route.photos[0] : '';

            return `
                <div class="info-window">
                    ${photo ? `<div class="info-photos"><img src="${photo}" alt="${route.name}"/></div>` : ''}
                    <div class="info-header">
                        <h3>${route.name}</h3>
                        <span class="info-difficulty">${difficultyStars}</span>
                    </div>
                    <div class="info-body">
                        <div class="info-row">
                            <span class="info-icon">📝</span>
                            <div class="info-content">${route.description}</div>
                        </div>
                        <div class="info-row">
                            <span class="info-icon">⏱️</span>
                            <div class="info-content">${route.duration} | ${route.distance}</div>
                        </div>
                        <div class="info-row">
                            <span class="info-icon">🏔️</span>
                            <div class="info-content">
                                <div class="info-tags">${sceneryTags}</div>
                            </div>
                        </div>
                        <button class="view-path-btn" onclick="showRoutePath(hikingRoutes.find(r => r.name === '${route.name}'))">
                            🗺️ 查看徒步路径
                        </button>
                    </div>
                </div>
            `;
        }

        // 显示路径并添加动画小人
        function showRoutePath(route) {
            clearPath();
            
            if (!route.path || route.path.length === 0) {
                alert('该路线暂无路径数据');
                return;
            }

            // 记录当前路线索引
            currentRouteIndex = displayedRoutes.findIndex(r => r.name === route.name);

            // 绘制路径
            currentPath = new AMap.Polyline({
                path: route.path,
                strokeColor: '#FF3B30',
                strokeWeight: 4,
                strokeOpacity: 0.8,
                lineJoin: 'round',
                lineCap: 'round'
            });
            
            map.add(currentPath);

            // 起点和终点
            const startMarker = new AMap.Marker({
                position: route.path[0],
                icon: new AMap.Icon({
                    size: new AMap.Size(30, 30),
                    image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                        <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="15" cy="15" r="12" fill="#34C759" stroke="white" stroke-width="2"/>
                            <text x="15" y="20" text-anchor="middle" fill="white" font-size="14" font-weight="bold">起</text>
                        </svg>
                    `),
                    imageSize: new AMap.Size(30, 30)
                })
            });

            const endMarker = new AMap.Marker({
                position: route.path[route.path.length - 1],
                icon: new AMap.Icon({
                    size: new AMap.Size(30, 30),
                    image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                        <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="15" cy="15" r="12" fill="#FF3B30" stroke="white" stroke-width="2"/>
                            <text x="15" y="20" text-anchor="middle" fill="white" font-size="14" font-weight="bold">终</text>
                        </svg>
                    `),
                    imageSize: new AMap.Size(30, 30)
                })
            });

            map.add([startMarker, endMarker]);
            paths.push(currentPath, startMarker, endMarker);

            // 自动适应视野
            map.setFitView([currentPath], false, [100, 100, 100, 100]);

            // 创建动画小人
            createWalkingMarker(route);
            
            // 显示路径信息卡片
            showPathInfo(route);
            
            // 更新导航按钮状态
            updateNavButtons();
        }

        // 创建动画小人 - 真正沿路径移动
        function createWalkingMarker(route) {
            // 小人图标 - 使用emoji让它更生动
            const personIcon = new AMap.Icon({
                size: new AMap.Size(40, 40),
                image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                        <text x="20" y="30" text-anchor="middle" font-size="32">🚶</text>
                    </svg>
                `),
                imageSize: new AMap.Size(40, 40)
            });

            walkingMarker = new AMap.Marker({
                position: route.path[0],
                icon: personIcon,
                offset: new AMap.Pixel(-20, -40),
                zIndex: 1000
            });

            map.add(walkingMarker);
            paths.push(walkingMarker);

            // 沿路径移动动画 - 使用 moveAlong 方法，小人会真正跟随路径
            walkingMarker.moveAlong(route.path, {
                duration: 5000, // 5秒完成全程
                autoRotation: true, // 自动旋转朝向运动方向
                circlable: false // 不循环
            });
        }

        // 更新导航按钮状态 - 循环模式下按钮永远可用
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            // 循环模式：按钮永远不禁用
            if (prevBtn && nextBtn) {
                prevBtn.disabled = false;
                nextBtn.disabled = false;
            }
        }

        // 上一个路线 - 循环模式
        function navigatePrev() {
            if (displayedRoutes.length === 0) return;
            
            // 如果是第一条，跳到最后一条（循环）
            let newIndex = currentRouteIndex - 1;
            if (newIndex < 0) {
                newIndex = displayedRoutes.length - 1;
            }
            
            const prevRoute = displayedRoutes[newIndex];
            showRoutePath(prevRoute);
            
            // 找到对应的marker
            const marker = markers.find(m => m.getExtData().name === prevRoute.name);
            if (marker) {
                // 关闭所有旧窗口
                closeAllInfoWindows();
                
                // 使用 setZoomAndCenter 精确居中，并设置合适的缩放级别
                map.setZoomAndCenter(13, marker.getPosition());
                
                // 延迟打开信息窗口
                setTimeout(() => {
                    const infoWindow = new AMap.InfoWindow({
                        content: createInfoWindowContent(prevRoute),
                        offset: new AMap.Pixel(0, -30)
                    });
                    currentInfoWindow = infoWindow;
                    infoWindow.open(map, marker.getPosition());
                }, 500);
            }
        }

        // 下一个路线 - 循环模式
        function navigateNext() {
            if (displayedRoutes.length === 0) return;
            
            // 如果是最后一条，跳到第一条（循环）
            let newIndex = currentRouteIndex + 1;
            if (newIndex >= displayedRoutes.length) {
                newIndex = 0;
            }
            
            const nextRoute = displayedRoutes[newIndex];
            showRoutePath(nextRoute);
            
            // 找到对应的marker
            const marker = markers.find(m => m.getExtData().name === nextRoute.name);
            if (marker) {
                // 关闭所有旧窗口
                closeAllInfoWindows();
                
                // 使用 setZoomAndCenter 精确居中，并设置合适的缩放级别
                map.setZoomAndCenter(13, marker.getPosition());
                
                // 延迟打开信息窗口
                setTimeout(() => {
                    const infoWindow = new AMap.InfoWindow({
                        content: createInfoWindowContent(nextRoute),
                        offset: new AMap.Pixel(0, -30)
                    });
                    currentInfoWindow = infoWindow;
                    infoWindow.open(map, marker.getPosition());
                }, 500);
            }
        }

        // 显示路径信息
        function showPathInfo(route) {
            const distance = parseFloat(route.distance.replace(/[^0-9.]/g, ''));
            const elevation = parseFloat(route.elevation.replace(/[^0-9.]/g, ''));
            
            // 计算卡路里: 距离(km) × 65 + 海拔(m) × 0.05
            const calories = Math.round(distance * 65 + elevation * 0.05);

            document.getElementById('pathDuration').textContent = route.duration;
            document.getElementById('pathDistance').textContent = route.distance;
            document.getElementById('pathCalories').innerHTML = formatCalories(calories);
            
            document.getElementById('pathInfoCard').classList.add('active');
        }

        // 将卡路里转换成形象的食物对比
        function formatCalories(calories) {
            // 常见食物卡路里参考
            const foods = [
                { name: '🥤 可乐', unit: '瓶', cal: 140 },
                { name: '🍔 汉堡', unit: '个', cal: 280 },
                { name: '🍎 苹果', unit: '个', cal: 50 },
                { name: '🍰 榴莲', unit: 'g', cal: 1.5, show: 100 }, // 每100g
                { name: '🍫 巧克力', unit: 'g', cal: 5.5, show: 100 },
                { name: '🍕 披萨', unit: '片', cal: 300 },
                { name: '🍜 拉面', unit: '碗', cal: 500 }
            ];

            // 根据卡路里选择最合适的食物（让数字在1-10之间）
            let bestFood = foods[0];
            let bestAmount = calories / bestFood.cal;
            
            for (let food of foods) {
                const amount = calories / food.cal;
                // 选择让数字在1-8之间的食物
                if (amount >= 1 && amount <= 8) {
                    if (Math.abs(amount - 3) < Math.abs(bestAmount - 3)) {
                        bestFood = food;
                        bestAmount = amount;
                    }
                }
            }

            // 格式化显示
            const amount = (calories / bestFood.cal).toFixed(1);
            const showAmount = bestFood.show ? `${(amount * bestFood.show).toFixed(0)}${bestFood.unit}` : `${amount}${bestFood.unit}`;
            
            return `${calories} kcal<br><span style="font-size:12px;color:#86868b;">≈ ${bestFood.name} ${showAmount}</span>`;
        }

        function clearPath() {
            paths.forEach(item => map.remove(item));
            paths = [];
            currentPath = null;
            walkingMarker = null;
            document.getElementById('pathInfoCard').classList.remove('active');
        }

        function renderRouteList(routes) {
            const listContainer = document.getElementById('routeList');
            listContainer.innerHTML = routes.map(route => {
                const difficultyStars = '★'.repeat(route.difficulty);
                return `
                    <div class="route-item" onclick="focusRoute('${route.name}')">
                        <div class="route-name">${route.name}</div>
                        <div class="route-meta">
                            <span class="difficulty">${difficultyStars}</span>
                            <span>⏱️ ${route.duration}</span>
                            <span>📏 ${route.distance}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function focusRoute(routeName) {
            const route = hikingRoutes.find(r => r.name === routeName);
            if (route) {
                // 显示路径和动画
                showRoutePath(route);
                
                // 找到对应的marker
                const marker = markers.find(m => m.getExtData().name === routeName);
                if (marker) {
                    // 关闭所有旧窗口
                    closeAllInfoWindows();
                    
                    // 使用 setZoomAndCenter 精确居中，并设置合适的缩放级别
                    map.setZoomAndCenter(13, marker.getPosition());
                    
                    // 延迟打开信息窗口
                    setTimeout(() => {
                        const infoWindow = new AMap.InfoWindow({
                            content: createInfoWindowContent(route),
                            offset: new AMap.Pixel(0, -30)
                        });
                        currentInfoWindow = infoWindow;
                        infoWindow.open(map, marker.getPosition());
                    }, 500);
                }
            }
        }

        // 筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const difficultyFilter = this.dataset.difficulty;
                currentFilter = difficultyFilter;
                
                let filteredRoutes = hikingRoutes;
                if (difficultyFilter !== 'all') {
                    const difficulties = difficultyFilter.split(',').map(Number);
                    filteredRoutes = hikingRoutes.filter(r => difficulties.includes(r.difficulty));
                }
                
                displayedRoutes = filteredRoutes; // 更新当前显示的路线列表
                renderMarkers(filteredRoutes);
                renderRouteList(filteredRoutes);
                
                // 自动显示第一条路线
                if (filteredRoutes.length > 0) {
                    setTimeout(() => {
                        focusRoute(filteredRoutes[0].name);
                    }, 300);
                }
            });
        });

        // 搜索
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            let filteredRoutes = hikingRoutes;
            
            if (currentFilter !== 'all') {
                const difficulties = currentFilter.split(',').map(Number);
                filteredRoutes = filteredRoutes.filter(r => difficulties.includes(r.difficulty));
            }
            
            if (keyword) {
                filteredRoutes = filteredRoutes.filter(route => 
                    route.name.toLowerCase().includes(keyword) ||
                    route.description.toLowerCase().includes(keyword) ||
                    route.scenery.some(s => s.toLowerCase().includes(keyword))
                );
            }
            
            displayedRoutes = filteredRoutes; // 更新当前显示的路线列表
            renderMarkers(filteredRoutes);
            renderRouteList(filteredRoutes);
        });

        // 切换侧边栏
        document.getElementById('toggleSidebar').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });

        window.onload = function() {
            if (typeof AMap === 'undefined') {
                alert('高德地图 API 加载失败');
                return;
            }
            initMap();
        };
    </script>
</body>
</html>
